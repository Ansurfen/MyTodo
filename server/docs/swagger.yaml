        required: true
        type: integer
      - description: to
        in: formData
        name: to
        required: true
        type: integer
      - description: reply
        in: formData
        name: reply
        type: string
      - description: content
        in: formData
        name: content
        required: true
        type: string
      - description: files
        in: formData
        name: files
        type: file
      responses:
        "200":
