basePath: /
definitions:
  api.GetChatRequest:
    properties:
      from:
        type: integer
      page:
        default: 1
        type: integer
      pageSize:
        default: 10
        type: integer
      to:
        type: integer
    type: object
  api.JoinTopicRequest:
    properties:
      invite_code:
        type: string
    type: object
  api.NotifyAddRequest:
    properties:
      content:
        default: This is a content
        type: string
      title:
        default: This is a title
        type: string
    type: object
  api.TaskCreateCond:
    properties:
      param:
        type: string
      type:
        type: integer
    type: object
  api.TaskCreateRequest:
    properties:
      arrival:
        type: string
      conds:
        items:
          $ref: '#/definitions/api.TaskCreateCond'
        type: array
      cron:
        type: integer
      departure:
        type: string
      desc:
        type: string
      name:
        type: string
      topic:
        type: integer
    type: object
  api.UserSignRequest:
    properties:
      email:
        default: a@gmail.com
        type: string
      password:
        default: root
        type: string
    required:
    - email
    - password
    type: object
info:
  contact: {}
  title: MyTodo
  version: "1.0"
