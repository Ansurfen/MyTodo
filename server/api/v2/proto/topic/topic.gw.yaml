type: google.api.Service
config_version: 3

# Please refer google.api.Http in https://github.com/googleapis/googleapis/blob/master/google/api/http.proto file for details.
http:
  rules:
    - selector: topic.TopicService.CreateTopic
      post: /v2/topic/add
      body: "*"
    - selector: topic.TopicService.DeleteTopic
      post: /v2/topic/del
      body: "*"
